name: React Build Check

# 어떤 이벤트가 발생했을 때 실행할지 정의합니다.
on:
  push:
    branches: [ "main", "master" ] # main 또는 master 브랜치에 푸시될 때
  pull_request:
    branches: [ "main", "master" ] # PR이 생성될 때

jobs:
  build:
    runs-on: ubuntu-latest # 실행할 가상 환경 (최신 우분투)

    steps:
    # 1. GitHub 저장소의 코드를 가상 환경으로 가져옵니다.
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Node.js 환경을 세팅합니다. (20버전 사용)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # npm 의존성 캐시 활성화 (속도 향상)
        
    # 3. 패키지(라이브러리)들을 설치합니다.
    - name: Install dependencies
      run: npm install
      
    # 4. 프로젝트를 빌드합니다.
    - name: Build project
      run: npm run build
